services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: imai-studio:aws
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: "3000"
      DATABASE_URL: file:/var/data/prod.sqlite
    volumes:
      - /var/data:/var/data
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
